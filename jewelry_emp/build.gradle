/*
 * jewelry_emp — 모놀리식 후보 서버 build.gradle.
 *
 * 기존 order/account/product/user 4개 서비스의 의존성을 합쳐 단일 부트 앱으로 빌드.
 *
 * 변경 사항 (기존 서비스 build.gradle 대비):
 *   - 추가  : Spring Modulith (모듈 경계 검증 + JPA Outbox 이벤트)
 *   - 제거  : Eureka Client, Spring Cloud Bus, Spring Cloud Config Client
 *   - 제거  : Kafka (spring-kafka, spring-cloud-starter-bus-kafka)
 *   - 유지  : OpenFeign — auth-service 와 통신용으로만 잔존 (선택적)
 *
 * 모놀리스 통합 후 같은 JVM 내 모듈 호출은 직접 메서드 호출로 처리되므로,
 * Resilience4j Circuit Breaker 도 제거 가능.
 */
ext {
    set('springCloudVersion', "2024.0.1")
    set('springModulithVersion', "1.3.4")
}

dependencies {
    // ---------- Spring Boot ----------
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-batch'

    // ---------- DB (PostgreSQL + Flyway) ----------
    implementation 'org.flywaydb:flyway-core:11.12.0'
    runtimeOnly    'org.flywaydb:flyway-database-postgresql:11.12.0'
    implementation 'org.postgresql:postgresql:42.6.0'
    testRuntimeOnly 'com.h2database:h2'

    // ---------- Redis (토큰·캐시·비동기 큐·분산 락) ----------
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    // implementation 'org.redisson:redisson-spring-boot-starter:3.49.0'  // 분산 락 필요 시 활성화

    // ---------- Spring Cloud ----------
    // config-server 에서 jewelry-dev.properties 를 내려받기 위한 Config Client + Bootstrap.
    implementation 'org.springframework.cloud:spring-cloud-starter-config'
    implementation 'org.springframework.cloud:spring-cloud-starter-bootstrap'
    // 기존 api-gateway 가 Eureka 기반 라우팅을 하므로 jewelry_emp 도 Eureka 에 등록.
    implementation 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-client'
    // 모놀리스 내부 호출은 모두 직접 호출로 전환되지만, 별도 유지된 auth-service 와의
    // 통신 + 잔존 inter-module Feign 클라이언트 (Phase B 에서 제거 예정) 를 위해 유지.
    implementation 'org.springframework.cloud:spring-cloud-starter-openfeign'
    // 잔존 Feign 들이 fallbackFactory 로 Resilience4j CircuitBreaker 를 사용하므로 추가.
    // Phase B 에서 Feign 을 모두 제거하면 함께 제거 가능.
    implementation 'org.springframework.cloud:spring-cloud-starter-circuitbreaker-resilience4j'

    // ---------- JWT ----------
    implementation 'io.jsonwebtoken:jjwt:0.12.3'
    implementation 'io.jsonwebtoken:jjwt-impl:0.12.3'
    implementation 'io.jsonwebtoken:jjwt-jackson:0.12.3'

    // ---------- QueryDSL ----------
    implementation 'com.querydsl:querydsl-jpa:5.1.0:jakarta'
    implementation 'org.jetbrains:annotations:24.0.0'
    annotationProcessor 'com.querydsl:querydsl-apt:5.1.0:jakarta'
    annotationProcessor 'jakarta.annotation:jakarta.annotation-api'
    annotationProcessor 'jakarta.persistence:jakarta.persistence-api'

    // ---------- TSID (Order/Stock/Sale 의 flowCode 글로벌 키) ----------
    implementation 'io.hypersistence:hypersistence-utils-hibernate-63:3.8.3'
    implementation 'com.github.f4b6a3:tsid-creator:5.2.6'

    // ---------- 파일 처리 ----------
    implementation 'com.opencsv:opencsv:5.9'
    implementation 'org.apache.poi:poi:5.4.1'
    implementation 'org.apache.poi:poi-ooxml:5.4.1'
    implementation 'org.jsoup:jsoup:1.21.2'
    // 이미지 썸네일 처리 — product 모듈 ProductImageService 가 사용.
    implementation 'net.coobird:thumbnailator:0.4.20'

    // ---------- Spring Retry ----------
    // product 모듈의 FactoryClient, ImageEmbeddingEventListener 가 @Retryable 사용.
    // @EnableRetry 활성화는 별도 Configuration 또는 main app 에서 수행 필요.
    implementation 'org.springframework.retry:spring-retry'
    implementation 'org.springframework:spring-aspects'

    // ---------- HTTP Client (user 모듈 NaverSensApi 등) ----------
    implementation 'org.apache.httpcomponents.client5:httpclient5'

    // ---------- Lombok ----------
    compileOnly         'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testCompileOnly         'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    // ---------- Test ----------
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.batch:spring-batch-test'
    testRuntimeOnly    'org.junit.platform:junit-platform-launcher'

    // common 모듈 (TenantContext, JwtUtil, ApiResponse 등 재사용)
    implementation       project(':common')
    annotationProcessor  project(':common')
}

tasks.named('test') {
    useJUnitPlatform()
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
        mavenBom "org.springframework.modulith:spring-modulith-bom:${springModulithVersion}"
    }
}
