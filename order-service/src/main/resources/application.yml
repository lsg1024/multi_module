spring:
  application:
    name: order
  profiles:
    active: dev
  config:
    import: optional:application-secret.properties

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  kafka:
    listener:
      missing-topics-fatal: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    bootstrap-servers: ${kafka.uri}
  cloud:
    bus:
      ack:
        enabled: true

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        jdbc:
          batch_size: 30
        show_sql: true
        format_sql: true

  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.kafka.retrytopic: debug
    org.apache.kafka.clients.consumer: WARN
    org.apache.kafka.clients.NetworkClient: WARN
    org.springframework.kafka: WARN
    com.netflix.discovery.shared.resolver.aws.ConfigClusterResolver: WARN
    com.msa.order.local.outbox.redis.OutboxRelayService: WARN
    com.msa.order.global.util.OutboxEventScheduler: WARN

management:
  endpoints:
    web:
      exposure:
        include: refresh, bus-refresh

custom:
  flyway:
    business:
      locations: classpath:db/migration
      baseline-on-migrate: true
    batch:
      locations: classpath:db/migration_batch
      baseline-on-migrate: true

  jpa:
    entity-scan-packages:
      - com.msa.order

# ============================================================
# 마이그레이션 실패 결과 CSV 저장 경로
#   - 기본값: src/main/resources/logs (개발 환경 기준)
#   - 운영: 환경변수 MIGRATION_FAILURE_LOG_DIR 로 외부 마운트 경로 주입 권장
#   - 디렉터리는 부재 시 자동 생성됨
# ============================================================
migration:
  failure-log-dir: ${MIGRATION_FAILURE_LOG_DIR:src/main/resources/logs}

qz:
  private-key: ${qz.private-key}